<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Glucose Log">
<meta name="theme-color" content="#0f172a">
<title>Glucose Log</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root {
  --bg:#0f172a; --surface:#1e293b; --surface2:#263348;
  --border:rgba(255,255,255,0.08); --border2:rgba(255,255,255,0.14);
  --text:#f1f5f9; --text2:#94a3b8; --text3:#64748b;
  --green:#34d399; --green-bg:rgba(52,211,153,0.12);
  --red:#f87171; --red-bg:rgba(248,113,113,0.14);
  --amber:#fbbf24; --amber-bg:rgba(251,191,36,0.12);
  --blue:#60a5fa; --blue-bg:rgba(96,165,250,0.1);
  --teal:#2dd4bf; --teal-bg:rgba(45,212,191,0.1);
  --radius:16px; --radius-sm:10px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;}
body{padding-top:var(--safe-top);padding-bottom:calc(var(--safe-bottom)+8px);overflow-x:hidden;}
.app{display:flex;flex-direction:column;min-height:100vh;max-width:430px;margin:0 auto;}

.topbar{padding:18px 20px 0;display:flex;align-items:center;justify-content:space-between;}
.app-title{font-size:22px;font-weight:600;letter-spacing:-0.5px;}
.app-date{font-size:12px;color:var(--text3);font-family:'DM Mono',monospace;}

.nav{display:flex;gap:6px;padding:14px 20px 0;}
.ntab{flex:1;padding:9px 0;font-size:13px;font-weight:500;text-align:center;border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;color:var(--text3);background:transparent;font-family:'DM Sans',sans-serif;transition:all 0.15s;}
.ntab.active{background:var(--blue-bg);border-color:rgba(96,165,250,0.35);color:var(--blue);}

.ref-banner{margin:14px 20px 0;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;}
.ref-list{list-style:none;display:flex;flex-direction:column;gap:5px;}
.ref-list li{font-size:13px;color:var(--text2);display:flex;align-items:center;gap:8px;}
.ref-list li::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--text3);flex-shrink:0;}
.ref-val{font-family:'DM Mono',monospace;font-size:13px;color:var(--text);margin-left:auto;}

.scroll-area{flex:1;overflow-y:auto;padding:14px 20px 30px;-webkit-overflow-scrolling:touch;}

.date-bar{display:flex;align-items:center;gap:8px;margin-bottom:14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;}
.date-nav-btn{background:transparent;border:none;color:var(--text2);cursor:pointer;font-size:18px;padding:0 4px;line-height:1;}
.date-nav-btn:active{color:var(--text);}
.date-display{font-family:'DM Mono',monospace;font-size:13px;color:var(--text);white-space:nowrap;flex:1;text-align:center;}
.today-chip{font-size:11px;padding:3px 9px;background:var(--blue-bg);border:1px solid rgba(96,165,250,0.3);border-radius:20px;color:var(--blue);cursor:pointer;white-space:nowrap;}

.slot-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:10px;transition:border-color 0.2s,background 0.2s;}
.slot-card.out-of-range{background:var(--red-bg);border-color:rgba(248,113,113,0.45);}
.slot-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.slot-name{font-size:13px;color:var(--text2);display:flex;align-items:center;gap:7px;}
.badge{font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;}
.badge-normal{background:var(--green-bg);color:var(--green);}
.badge-high{background:var(--red-bg);color:var(--red);}
.badge-low{background:var(--amber-bg);color:var(--amber);}

.reading-row{display:flex;align-items:baseline;gap:6px;margin-bottom:4px;}
.reading-val{font-size:36px;font-weight:600;font-family:'DM Mono',monospace;letter-spacing:-1px;}
.reading-val.normal{color:var(--green);}
.reading-val.high{color:var(--red);}
.reading-val.low{color:var(--amber);}
.reading-unit{font-size:14px;color:var(--text3);}
.edit-btn{margin-left:auto;background:transparent;border:1px solid var(--border2);border-radius:8px;padding:5px 12px;font-size:12px;color:var(--text3);cursor:pointer;font-family:'DM Sans',sans-serif;}
.edit-btn:active{background:var(--surface2);}

/* Logged time */
.logged-time{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;margin-bottom:12px;display:flex;align-items:center;gap:5px;}
.logged-time::before{content:'🕐';font-size:11px;}

.input-row{display:flex;gap:8px;align-items:center;}
.g-input{flex:1;height:48px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:0 14px;font-size:22px;font-weight:500;font-family:'DM Mono',monospace;color:var(--text);outline:none;-webkit-appearance:none;}
.g-input:focus{border-color:rgba(96,165,250,0.5);}
.g-unit{font-size:13px;color:var(--text3);white-space:nowrap;}
.save-btn{height:48px;padding:0 18px;background:var(--blue-bg);border:1px solid rgba(96,165,250,0.35);border-radius:var(--radius-sm);font-size:14px;font-weight:500;color:var(--blue);cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap;}
.save-btn:active{background:rgba(96,165,250,0.2);}

.add-extra-btn{display:flex;align-items:center;gap:6px;margin-top:10px;padding:7px 12px;background:transparent;border:1px dashed var(--border2);border-radius:var(--radius-sm);font-size:12px;color:var(--text3);cursor:pointer;font-family:'DM Sans',sans-serif;width:100%;}
.add-extra-btn:active{background:var(--surface2);}
.plus-circle{width:18px;height:18px;border-radius:50%;border:1px solid var(--text3);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
.extra-card{margin-top:8px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;}
.extra-card.out-of-range{background:rgba(248,113,113,0.1);border-color:rgba(248,113,113,0.3);}
.extra-label{font-size:12px;color:var(--text3);margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;}
.extra-val-row{display:flex;align-items:baseline;gap:6px;margin-bottom:4px;}
.extra-val{font-size:28px;font-weight:600;font-family:'DM Mono',monospace;letter-spacing:-0.5px;}
.extra-val.normal{color:var(--green);}
.extra-val.high{color:var(--red);}
.extra-val.low{color:var(--amber);}
.extra-time{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;display:flex;align-items:center;gap:5px;}
.extra-time::before{content:'🕐';font-size:11px;}

.walk-section{margin-top:12px;padding-top:12px;border-top:1px solid var(--border);}
.section-label{font-size:11px;font-weight:600;color:var(--teal);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:5px;}
.walk-opts{display:flex;gap:6px;flex-wrap:wrap;}
.wopt{padding:7px 13px;font-size:13px;border:1px solid var(--border2);border-radius:20px;cursor:pointer;color:var(--text3);background:transparent;font-family:'DM Sans',sans-serif;transition:all 0.15s;}
.wopt.sel{background:var(--teal-bg);border-color:rgba(45,212,191,0.4);color:var(--teal);font-weight:500;}

.notes-section{margin-top:12px;padding-top:12px;border-top:1px solid rgba(248,113,113,0.2);}
.notes-label{font-size:11px;font-weight:600;color:var(--red);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:8px;}
.notes-ta{width:100%;min-height:68px;background:rgba(248,113,113,0.06);border:1px solid rgba(248,113,113,0.25);border-radius:var(--radius-sm);padding:10px 12px;font-size:14px;color:var(--text);font-family:'DM Sans',sans-serif;line-height:1.5;outline:none;resize:none;}
.notes-ta:focus{border-color:rgba(248,113,113,0.5);}
.notes-saved{background:rgba(248,113,113,0.07);border:1px solid rgba(248,113,113,0.2);border-radius:var(--radius-sm);padding:10px 12px;font-size:14px;color:var(--text2);line-height:1.5;}
.note-btn{margin-top:8px;padding:7px 14px;background:transparent;border:1px solid var(--border2);border-radius:8px;font-size:12px;color:var(--text3);cursor:pointer;font-family:'DM Sans',sans-serif;}

.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;}
.chart-title{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:12px;}
.chart-wrap{position:relative;}
.trend-filter{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px;}
.tpill{padding:5px 11px;font-size:12px;border:1px solid var(--border2);border-radius:20px;cursor:pointer;color:var(--text3);background:transparent;font-family:'DM Sans',sans-serif;}
.tpill.active{background:var(--blue-bg);border-color:rgba(96,165,250,0.35);color:var(--blue);}
.legend-row{display:flex;gap:14px;margin-top:10px;flex-wrap:wrap;}
.leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text3);}
.leg-dot{width:8px;height:8px;border-radius:50%;}

.hist-date-div{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:0.06em;text-transform:uppercase;padding:14px 0 6px;font-family:'DM Mono',monospace;}
.hist-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;overflow:hidden;}
.hist-card.out-of-range{background:var(--red-bg);border-color:rgba(248,113,113,0.35);}
.hist-main{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;}
.hist-left{flex:1;}
.hist-slot{font-size:13px;color:var(--text2);}
.hist-meta{display:flex;align-items:center;gap:8px;margin-top:3px;flex-wrap:wrap;}
.hist-time{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;}
.hist-walk{font-size:11px;color:var(--teal);}
.hist-val{font-size:20px;font-weight:600;font-family:'DM Mono',monospace;}
.hist-note{padding:0 16px 12px;font-size:13px;color:#fca5a5;line-height:1.4;display:flex;gap:6px;}

.action-row{display:flex;gap:8px;margin-bottom:12px;}
.action-btn{flex:1;padding:12px 10px;background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius-sm);font-size:13px;color:var(--text2);cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;justify-content:center;gap:7px;font-weight:500;}
.action-btn.primary{background:var(--blue-bg);border-color:rgba(96,165,250,0.35);color:var(--blue);}
.action-btn:active{opacity:0.8;}

.empty{text-align:center;padding:48px 20px;color:var(--text3);}
.empty-icon{font-size:40px;margin-bottom:12px;}
.empty-text{font-size:14px;line-height:1.6;}

.install-hint{margin:12px 20px 0;background:var(--blue-bg);border:1px solid rgba(96,165,250,0.2);border-radius:var(--radius-sm);padding:10px 14px;font-size:12px;color:var(--blue);line-height:1.5;display:flex;gap:8px;align-items:flex-start;}
.hint-close{margin-left:auto;background:transparent;border:none;color:var(--blue);cursor:pointer;font-size:16px;padding:0 0 0 8px;flex-shrink:0;}

.week-summary-card{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;}
.week-label{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:0.06em;text-transform:uppercase;font-family:'DM Mono',monospace;margin-bottom:10px;}
.week-avgs{display:flex;gap:10px;}
.week-avg-item{flex:1;background:var(--surface2);border-radius:var(--radius-sm);padding:10px 12px;}
.week-avg-label{font-size:11px;color:var(--text3);margin-bottom:4px;}
.week-avg-val{font-size:22px;font-weight:600;font-family:'DM Mono',monospace;letter-spacing:-0.5px;}
.week-avg-val.normal{color:var(--green);}
.week-avg-val.high{color:var(--red);}
.week-avg-unit{font-size:11px;color:var(--text3);margin-top:3px;}
.snack-section-header{display:flex;align-items:center;justify-content:space-between;margin-top:16px;margin-bottom:8px;}
.snack-section-title{font-size:11px;font-weight:600;color:var(--amber);letter-spacing:0.06em;text-transform:uppercase;display:flex;align-items:center;gap:5px;}
.add-snack-btn{display:flex;align-items:center;gap:5px;padding:7px 14px;background:var(--amber-bg);border:1px solid rgba(251,191,36,0.3);border-radius:20px;font-size:12px;font-weight:500;color:var(--amber);cursor:pointer;font-family:'DM Sans',sans-serif;}
.add-snack-btn:active{background:rgba(251,191,36,0.2);}
.high-2hr-prompt{margin-top:10px;background:rgba(248,113,113,0.08);border:1px solid rgba(248,113,113,0.35);border-radius:var(--radius-sm);padding:12px 14px;}
.high-2hr-label{font-size:12px;font-weight:600;color:var(--red);margin-bottom:8px;display:flex;align-items:center;gap:5px;}
.day-note-section{margin-top:14px;padding-top:14px;border-top:1px solid var(--border);}
.day-note-label{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:5px;}
.day-note-ta{width:100%;min-height:80px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:10px 12px;font-size:14px;color:var(--text);font-family:'DM Sans',sans-serif;line-height:1.5;outline:none;resize:none;}
.day-note-ta:focus{border-color:rgba(96,165,250,0.4);}
.day-note-saved{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;font-size:14px;color:var(--text2);line-height:1.5;}
.add-day-note-btn{display:flex;align-items:center;gap:6px;margin-top:14px;padding:9px 14px;background:transparent;border:1px dashed var(--border2);border-radius:var(--radius-sm);font-size:13px;color:var(--text3);cursor:pointer;font-family:'DM Sans',sans-serif;width:100%;}
.add-day-note-btn:active{background:var(--surface2);}

.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--text3);flex-shrink:0;display:inline-block;}
.sync-dot.ok{background:var(--green);}
.sync-dot.err{background:var(--red);}
.sync-dot.syncing{background:var(--blue);animation:sbpulse 1s ease-in-out infinite;}
@keyframes sbpulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
.signout-btn{background:transparent;border:none;cursor:pointer;color:var(--text3);font-size:16px;padding:4px 2px;line-height:1;}
.signout-btn:active{color:var(--text);}
.login-overlay{position:fixed;inset:0;z-index:300;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:32px 24px;}
.login-card{width:100%;max-width:340px;display:flex;flex-direction:column;align-items:center;}
.login-title{font-size:22px;font-weight:600;letter-spacing:-0.5px;margin-bottom:8px;text-align:center;}
.login-desc{font-size:14px;color:var(--text2);line-height:1.6;margin-bottom:28px;text-align:center;}
.login-input{width:100%;height:52px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:0 16px;font-size:16px;color:var(--text);outline:none;font-family:'DM Sans',sans-serif;-webkit-appearance:none;}
.login-input:focus{border-color:rgba(96,165,250,0.5);}
.login-btn{width:100%;height:52px;background:var(--blue-bg);border:1px solid rgba(96,165,250,0.35);border-radius:var(--radius-sm);font-size:15px;font-weight:500;color:var(--blue);cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:12px;}
.login-btn:active{background:rgba(96,165,250,0.2);}
.login-btn:disabled{opacity:0.5;cursor:default;}
.login-ghost-btn{width:100%;height:44px;background:transparent;border:1px solid var(--border2);border-radius:var(--radius-sm);font-size:14px;color:var(--text3);cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:10px;}
.user-email{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
</style>
</head>
<body>
<div id="loginScreen" class="login-overlay">
  <div class="login-card">
    <div style="font-size:48px;margin-bottom:20px">🩸</div>
    <div class="login-title">Glucose Log</div>
    <div class="login-desc">Sign in to sync your readings across all your devices.</div>
    <input type="email" id="loginEmail" class="login-input" placeholder="your@email.com" autocomplete="email">
    <input type="password" id="loginPassword" class="login-input" placeholder="password" autocomplete="current-password" style="margin-top:10px">
    <button class="login-btn" id="loginBtn" onclick="signInWithPassword()">Sign in</button>
    <button class="login-ghost-btn" onclick="sendPasswordReset()" style="margin-top:6px;font-size:13px">Forgot password?</button>
    <div id="loginError" style="font-size:13px;margin-top:10px;min-height:18px;text-align:center"></div>
  </div>
</div>

<div class="app">
  <div class="topbar">
    <div class="app-title">Glucose Log</div>
    <div style="display:flex;align-items:center;gap:10px">
      <span class="user-email" id="userEmailDisplay"></span>
      <span class="sync-dot" id="syncDot"></span>
      <button class="signout-btn" onclick="signOut()" aria-label="Sign out" title="Sign out">↩</button>
      <div class="app-date" id="topDate"></div>
    </div>
  </div>

  <div id="installHint" class="install-hint">
    Tip: in Safari tap Share → Add to Home Screen to use as an app
    <button class="hint-close" onclick="dismissHint()" aria-label="Dismiss">&#x2715;</button>
  </div>

  <div class="ref-banner">
    <ul class="ref-list">
      <li>Fasting upper limit <span class="ref-val">5.5 mmol/L</span></li>
      <li>1 hr after meal upper limit <span class="ref-val">7.8 mmol/L</span></li>
      <li>2 hr after meal upper limit <span class="ref-val">6.7 mmol/L</span></li>
    </ul>
  </div>

  <div class="nav">
    <button class="ntab active" onclick="setView('today')" id="tab-today">Today</button>
    <button class="ntab" onclick="setView('trend')" id="tab-trend">Trend</button>
    <button class="ntab" onclick="setView('history')" id="tab-history">History</button>
  </div>

  <div class="scroll-area">
    <div id="view-today"></div>
    <div id="view-trend" style="display:none"></div>
    <div id="view-history" style="display:none"></div>
  </div>
</div>

<script>
const SUPABASE_URL='https://aqpxicoejkbscqymxqso.supabase.co';
const SUPABASE_ANON_KEY='sb_publishable_vSmnDUbGhA5aT7oogojoUg_itfbA2vC';
const AUTH_KEY='glucoseAuth_v1';
let authState=null;

const SLOTS=[
  {id:'fasting',       label:'Fasting (before breakfast)',icon:'🌙',normal:[3.9,5.5],has2hr:false},
  {id:'post_breakfast',label:'1 hr after breakfast',      icon:'☕',normal:[3.9,7.8],has2hr:true},
  {id:'post_lunch',    label:'1 hr after lunch',          icon:'🥣',normal:[3.9,7.8],has2hr:true},
  {id:'post_dinner',   label:'1 hr after dinner',         icon:'🌒',normal:[3.9,7.8],has2hr:true},
];
const NORMAL_2HR=[3.9,6.7];
const WALKS=['No walk','10 min','20 min','30+ min'];
const START='2026-06-04';
const KEY='glucoseLog_v4';

const todayKey=()=>new Date().toISOString().split('T')[0];
const fmt1=v=>parseFloat(v.toFixed(1));
const escHtml=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

function nowTime(){
  const n=new Date();
  return n.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
}
function fmtTime(t){return t||'';}

function load(){try{return JSON.parse(localStorage.getItem(KEY)||'{}');}catch{return {};}}
function saveLocal(d){try{localStorage.setItem(KEY,JSON.stringify(d));}catch{alert('Storage full — please export your data.');}}
function save(d,date){saveLocal(d);if(date)pushDay(date);}

let data={};
let view='today';
let activeDate=todayKey();
let trendSlot='all';
let charts={};
let showingDayNote={};

function classify(v,normal){if(v<normal[0])return 'low';if(v>normal[1])return 'high';return 'normal';}
function statusColor(cls){return cls==='normal'?'#34d399':cls==='high'?'#f87171':'#fbbf24';}
function isOutOfRange(entry,slot){
  if(!entry)return false;
  if(entry.val!==undefined&&classify(entry.val,slot.normal)!=='normal')return true;
  if(entry.val2!==undefined&&classify(entry.val2,NORMAL_2HR)!=='normal')return true;
  return false;
}

function dateRange(from){
  const dates=[];
  const s=new Date((from||START)+'T12:00:00'),e=new Date();
  for(let d=new Date(s);d<=e;d.setDate(d.getDate()+1))
    dates.push(d.toISOString().split('T')[0]);
  return dates;
}
function fmtDateLong(d){
  if(d===todayKey())return 'Today';
  return new Date(d+'T12:00:00').toLocaleDateString('en-GB',{weekday:'short',month:'short',day:'numeric'});
}
function fmtShort(d){const dt=new Date(d+'T12:00:00');return (dt.getMonth()+1)+'/'+(dt.getDate());}
function prevDay(d){const dt=new Date(d+'T12:00:00');dt.setDate(dt.getDate()-1);return dt.toISOString().split('T')[0];}
function nextDay(d){const dt=new Date(d+'T12:00:00');dt.setDate(dt.getDate()+1);return dt.toISOString().split('T')[0];}

function dismissHint(){document.getElementById('installHint').style.display='none';localStorage.setItem('hintDismissed','1');}
if(localStorage.getItem('hintDismissed'))document.getElementById('installHint').style.display='none';

function setView(v){
  view=v;
  ['today','trend','history'].forEach(x=>{
    document.getElementById('view-'+x).style.display=x===v?'':'none';
    document.getElementById('tab-'+x).classList.toggle('active',x===v);
  });
  if(v==='today')renderToday();
  if(v==='trend')renderTrend();
  if(v==='history')renderHistory();
}

// ── TODAY ──
function renderToday(){
  const el=document.getElementById('view-today');
  const isToday=activeDate===todayKey();
  const canGoForward=activeDate<todayKey();

  el.innerHTML=`<div class="date-bar">
    <button class="date-nav-btn" onclick="goDay(-1)" aria-label="Previous day">&#8592;</button>
    <span class="date-display">${isToday?'<span style="color:var(--blue)">Today</span>':'<span>'+new Date(activeDate+'T12:00:00').toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'})+'</span>'}</span>
    <button class="date-nav-btn" onclick="goDay(1)" aria-label="Next day" ${canGoForward?'':'disabled style="opacity:0.3;cursor:default"'}>&#8594;</button>

  </div>`;

  const td=data[activeDate]||{};
  if(activeDate>todayKey()){el.innerHTML+='<div class="empty"><div class="empty-text">Cannot log future dates.</div></div>';return;}

  const frag=document.createDocumentFragment();
  SLOTS.forEach(slot=>{
    const entry=td[slot.id];
    const val=entry?.val;
    const val2=entry?.val2;
    const walk=entry?.walk||'';
    const note=entry?.note||'';
    const loggedAt=entry?.time||'';
    const loggedAt2=entry?.time2||'';
    const hasSaved=val!==undefined;
    const cls=hasSaved?classify(val,slot.normal):'';
    const isHigh=hasSaved&&cls==='high';
    const oor=isOutOfRange(entry,slot);
    const cls2=val2!==undefined?classify(val2,NORMAL_2HR):'';
    const oor2=val2!==undefined&&cls2!=='normal';
    const show2hrInput=entry?.show2hr&&val2===undefined;

    const card=document.createElement('div');
    card.className='slot-card'+(oor?' out-of-range':'');

    if(hasSaved){
      const walkBtns=WALKS.map(w=>`<button class="wopt${walk===w?' sel':''}" onclick="pickWalk('${activeDate}','${slot.id}','${w}')">${w}</button>`).join('');

      let extra2='';
      if(slot.has2hr){
        if(val2!==undefined){
          extra2=`<div class="extra-card${oor2?' out-of-range':''}">
            <div class="extra-label"><span>2 hrs after meal</span><button class="edit-btn" style="font-size:11px;padding:3px 8px" onclick="editExtra('${activeDate}','${slot.id}')">Edit</button></div>
            <div class="extra-val-row"><span class="extra-val ${cls2}">${fmt1(val2).toFixed(1)}</span><span class="reading-unit">mmol/L</span><span class="badge badge-${cls2}" style="margin-left:6px">${cls2.charAt(0).toUpperCase()+cls2.slice(1)}</span></div>
            ${loggedAt2?`<div class="extra-time">Logged at ${fmtTime(loggedAt2)}</div>`:''}
          </div>`;
        }else if(show2hrInput){
          extra2=isHigh
            ?`<div class="high-2hr-prompt"><div class="high-2hr-label">⚠️ High reading — log your 2 hr reading</div><div class="input-row"><input class="g-input" type="number" inputmode="decimal" step="0.1" min="1" max="30" placeholder="0.0" id="inp2_${slot.id}"><span class="g-unit">mmol/L</span><button class="save-btn" onclick="saveExtra('${activeDate}','${slot.id}')">Save</button></div></div>`
            :`<div class="extra-card"><div class="extra-label">2 hr reading</div><div class="input-row"><input class="g-input" type="number" inputmode="decimal" step="0.1" min="1" max="30" placeholder="0.0" id="inp2_${slot.id}"><span class="g-unit">mmol/L</span><button class="save-btn" onclick="saveExtra('${activeDate}','${slot.id}')">Save</button></div></div>`;
        }else{
          extra2=`<button class="add-extra-btn" onclick="showExtra('${activeDate}','${slot.id}')"><span class="plus-circle">+</span> Add 2 hr reading</button>`;
        }
      }

      let noteHtml='';
      if(isHigh||oor2){
        if(note){
          noteHtml=`<div class="notes-section"><div class="notes-label">What you ate</div><div class="notes-saved">${escHtml(note)}</div><button class="note-btn" onclick="clearNote('${activeDate}','${slot.id}')">Edit note</button></div>`;
        }else{
          noteHtml=`<div class="notes-section"><div class="notes-label">Reading above target — what did you eat?</div><textarea class="notes-ta" id="ta_${slot.id}" placeholder="e.g. white rice, fruit juice, bread…" rows="3"></textarea><button class="note-btn" style="color:var(--red);border-color:rgba(248,113,113,0.3)" onclick="saveNote('${activeDate}','${slot.id}')">Save note</button></div>`;
        }
      }

      card.innerHTML=`
        <div class="slot-top"><div class="slot-name"><span>${slot.icon}</span>${slot.label}</div><span class="badge badge-${cls}">${cls.charAt(0).toUpperCase()+cls.slice(1)}</span></div>
        <div class="reading-row"><span class="reading-val ${cls}">${fmt1(val).toFixed(1)}</span><span class="reading-unit">mmol/L</span><button class="edit-btn" onclick="editSlot('${activeDate}','${slot.id}')">Edit</button></div>
        <div class="logged-time">Logged at ${fmtTime(loggedAt)}</div>
        ${extra2}
        <div class="walk-section"><div class="section-label">🚶 Did you walk after this?</div><div class="walk-opts">${walkBtns}</div></div>
        ${noteHtml}`;
    }else{
      card.innerHTML=`
        <div class="slot-top"><div class="slot-name"><span>${slot.icon}</span>${slot.label}</div></div>
        <div class="input-row"><input class="g-input" type="number" inputmode="decimal" step="0.1" min="1" max="30" placeholder="0.0" id="inp_${slot.id}" aria-label="${slot.label} in mmol/L"><span class="g-unit">mmol/L</span><button class="save-btn" onclick="saveSlot('${activeDate}','${slot.id}')">Save</button></div>`;
    }
    frag.appendChild(card);
  });
  el.appendChild(frag);

  // Snack section
  const SNACK_1HR=[3.9,7.8];
  const snacks=(td.snacks||[]);
  const snackDiv=document.createElement('div');
  let snackHtml=`<div class="snack-section-header"><div class="snack-section-title">🍿 Snacks</div><button class="add-snack-btn" onclick="addSnack('${activeDate}')">+ Snack</button></div>`;
  snacks.forEach((snack,idx)=>{
    const hasSaved=snack.val!==undefined;
    const scls=hasSaved?classify(snack.val,SNACK_1HR):'';
    const sHigh=hasSaved&&scls==='high';
    const scls2=snack.val2!==undefined?classify(snack.val2,NORMAL_2HR):'';
    const soor=hasSaved&&scls!=='normal';
    const soor2=snack.val2!==undefined&&scls2!=='normal';
    if(hasSaved){
      const walkBtns=WALKS.map(w=>`<button class="wopt${snack.walk===w?' sel':''}" onclick="pickSnackWalk('${activeDate}',${idx},'${w}')">${w}</button>`).join('');
      let sExtra2='';
      if(snack.val2!==undefined){
        sExtra2=`<div class="extra-card${soor2?' out-of-range':''}"><div class="extra-label"><span>2 hrs after snack</span><button class="edit-btn" style="font-size:11px;padding:3px 8px" onclick="editSnackExtra('${activeDate}',${idx})">Edit</button></div><div class="extra-val-row"><span class="extra-val ${scls2}">${fmt1(snack.val2).toFixed(1)}</span><span class="reading-unit">mmol/L</span><span class="badge badge-${scls2}" style="margin-left:6px">${scls2.charAt(0).toUpperCase()+scls2.slice(1)}</span></div>${snack.time2?`<div class="extra-time">Logged at ${snack.time2}</div>`:''}</div>`;
      }else if(snack.show2hr){
        sExtra2=sHigh
          ?`<div class="high-2hr-prompt"><div class="high-2hr-label">⚠️ High reading — log your 2 hr reading</div><div class="input-row"><input class="g-input" type="number" inputmode="decimal" step="0.1" min="1" max="30" placeholder="0.0" id="snack_inp2_${idx}"><span class="g-unit">mmol/L</span><button class="save-btn" onclick="saveSnackExtra('${activeDate}',${idx})">Save</button></div></div>`
          :`<div class="extra-card"><div class="extra-label">2 hr reading</div><div class="input-row"><input class="g-input" type="number" inputmode="decimal" step="0.1" min="1" max="30" placeholder="0.0" id="snack_inp2_${idx}"><span class="g-unit">mmol/L</span><button class="save-btn" onclick="saveSnackExtra('${activeDate}',${idx})">Save</button></div></div>`;
      }else{
        sExtra2=`<button class="add-extra-btn" onclick="showSnackExtra('${activeDate}',${idx})"><span class="plus-circle">+</span> Add 2 hr reading</button>`;
      }
      let sNoteHtml='';
      if(sHigh||soor2){
        if(snack.note){
          sNoteHtml=`<div class="notes-section"><div class="notes-label">What you ate</div><div class="notes-saved">${escHtml(snack.note)}</div><button class="note-btn" onclick="clearSnackNote('${activeDate}',${idx})">Edit note</button></div>`;
        }else{
          sNoteHtml=`<div class="notes-section"><div class="notes-label">Reading above target — what did you eat?</div><textarea class="notes-ta" id="snack_ta_${idx}" placeholder="e.g. crackers, fruit, chips…" rows="2"></textarea><button class="note-btn" style="color:var(--red);border-color:rgba(248,113,113,0.3)" onclick="saveSnackNote('${activeDate}',${idx})">Save note</button></div>`;
        }
      }
      snackHtml+=`<div class="slot-card${soor?' out-of-range':''}"><div class="slot-top"><div class="slot-name"><span>🍿</span>Snack ${idx+1} — 1 hr post-snack</div><div style="display:flex;align-items:center;gap:6px"><span class="badge badge-${scls}">${scls.charAt(0).toUpperCase()+scls.slice(1)}</span><button class="edit-btn" onclick="removeSnack('${activeDate}',${idx})" style="color:var(--red);border-color:rgba(248,113,113,0.2)">✕</button></div></div><div class="reading-row"><span class="reading-val ${scls}">${fmt1(snack.val).toFixed(1)}</span><span class="reading-unit">mmol/L</span><button class="edit-btn" onclick="editSnack('${activeDate}',${idx})">Edit</button></div><div class="logged-time">Logged at ${snack.time}</div>${sExtra2}<div class="walk-section"><div class="section-label">🚶 Did you walk after?</div><div class="walk-opts">${walkBtns}</div></div>${sNoteHtml}</div>`;
    }else{
      snackHtml+=`<div class="slot-card"><div class="slot-top"><div class="slot-name"><span>🍿</span>Snack ${idx+1} — 1 hr post-snack</div><button class="edit-btn" onclick="removeSnack('${activeDate}',${idx})" style="color:var(--red);border-color:rgba(248,113,113,0.2)">✕ Remove</button></div><div class="input-row"><input class="g-input" type="number" inputmode="decimal" step="0.1" min="1" max="30" placeholder="0.0" id="snack_inp_${idx}" aria-label="Snack ${idx+1} 1hr reading in mmol/L"><span class="g-unit">mmol/L</span><button class="save-btn" onclick="saveSnack('${activeDate}',${idx})">Save</button></div></div>`;
    }
  });
  snackDiv.innerHTML=snackHtml;
  el.appendChild(snackDiv);

  // Day note
  const dayNote=td.dayNote||'';
  const editingDayNote=showingDayNote[activeDate]||false;
  const dayNoteDiv=document.createElement('div');
  if(editingDayNote){
    dayNoteDiv.innerHTML=`<div class="day-note-section">
      <div class="day-note-label">📓 Day Notes</div>
      <textarea class="day-note-ta" id="day_ta_${activeDate}" placeholder="How are you feeling today? Any patterns you noticed?">${escHtml(dayNote)}</textarea>
      <div style="display:flex;gap:8px;margin-top:8px">
        <button class="note-btn" style="color:var(--blue);border-color:rgba(96,165,250,0.3)" onclick="saveDayNote('${activeDate}')">Save</button>
        ${dayNote?`<button class="note-btn" onclick="cancelDayNote('${activeDate}')">Cancel</button>`:''}
      </div>
    </div>`;
  }else if(dayNote){
    dayNoteDiv.innerHTML=`<div class="day-note-section">
      <div class="day-note-label">📓 Day Notes</div>
      <div class="day-note-saved">${escHtml(dayNote)}</div>
      <button class="note-btn" onclick="showDayNote('${activeDate}')" style="margin-top:6px">Edit note</button>
    </div>`;
  }else{
    dayNoteDiv.innerHTML=`<button class="add-day-note-btn" onclick="showDayNote('${activeDate}')"><span class="plus-circle">+</span> Add a note for today</button>`;
  }
  el.appendChild(dayNoteDiv);
}

function showDayNote(date){showingDayNote[date]=true;renderToday();}
function cancelDayNote(date){showingDayNote[date]=false;renderToday();}
function saveDayNote(date){
  const ta=document.getElementById('day_ta_'+date);if(!ta)return;
  const note=ta.value.trim();
  if(!data[date])data[date]={};
  if(note)data[date].dayNote=note;else delete data[date].dayNote;
  showingDayNote[date]=false;
  save(data,date);renderToday();
}

function goDay(dir){
  const next=dir>0?nextDay(activeDate):prevDay(activeDate);
  if(next<START)return;
  activeDate=next;renderToday();
}
function goToday(){activeDate=todayKey();renderToday();}

function saveSlot(date,slotId){
  const inp=document.getElementById('inp_'+slotId);
  const raw=parseFloat(inp.value);
  if(isNaN(raw)||raw<1||raw>30){inp.style.borderColor='#f87171';setTimeout(()=>inp.style.borderColor='',1500);return;}
  const slot=SLOTS.find(s=>s.id===slotId);
  const autoShow2hr=slot.has2hr&&classify(fmt1(raw),slot.normal)==='high';
  if(!data[date])data[date]={};
  data[date][slotId]={val:fmt1(raw),walk:'',note:'',show2hr:autoShow2hr,time:nowTime()};
  save(data,date);renderToday();
}
function editSlot(date,slotId){if(data[date])delete data[date][slotId];save(data,date);renderToday();}
function showExtra(date,slotId){if(!data[date]?.[slotId])return;data[date][slotId].show2hr=true;save(data,date);renderToday();}
function saveExtra(date,slotId){
  const inp=document.getElementById('inp2_'+slotId);if(!inp)return;
  const raw=parseFloat(inp.value);
  if(isNaN(raw)||raw<1||raw>30){inp.style.borderColor='#f87171';setTimeout(()=>inp.style.borderColor='',1500);return;}
  if(!data[date]?.[slotId])return;
  data[date][slotId].val2=fmt1(raw);
  data[date][slotId].time2=nowTime();
  save(data,date);renderToday();
}
function editExtra(date,slotId){if(!data[date]?.[slotId])return;delete data[date][slotId].val2;delete data[date][slotId].time2;data[date][slotId].show2hr=true;save(data,date);renderToday();}
function pickWalk(date,slotId,w){if(!data[date]?.[slotId])return;data[date][slotId].walk=w;save(data,date);renderToday();}
function saveNote(date,slotId){const ta=document.getElementById('ta_'+slotId);if(!ta||!data[date]?.[slotId])return;data[date][slotId].note=ta.value.trim();save(data,date);renderToday();}
function clearNote(date,slotId){if(!data[date]?.[slotId])return;data[date][slotId].note='';save(data,date);renderToday();}

// ── SNACKS ──
const SNACK_NORMAL_1HR=[3.9,7.8];
function addSnack(date){
  if(!data[date])data[date]={};
  if(!data[date].snacks)data[date].snacks=[];
  data[date].snacks.push({show2hr:false});
  save(data,date);renderToday();
}
function saveSnack(date,idx){
  const inp=document.getElementById('snack_inp_'+idx);
  const raw=parseFloat(inp.value);
  if(isNaN(raw)||raw<1||raw>30){inp.style.borderColor='#f87171';setTimeout(()=>inp.style.borderColor='',1500);return;}
  if(!data[date]?.snacks?.[idx])return;
  const autoShow2hr=classify(fmt1(raw),SNACK_NORMAL_1HR)==='high';
  data[date].snacks[idx]={...data[date].snacks[idx],val:fmt1(raw),time:nowTime(),show2hr:autoShow2hr};
  save(data,date);renderToday();
}
function editSnack(date,idx){
  if(!data[date]?.snacks?.[idx])return;
  const s=data[date].snacks[idx];
  delete s.val;delete s.time;delete s.val2;delete s.time2;s.show2hr=false;
  save(data,date);renderToday();
}
function saveSnackExtra(date,idx){
  const inp=document.getElementById('snack_inp2_'+idx);if(!inp)return;
  const raw=parseFloat(inp.value);
  if(isNaN(raw)||raw<1||raw>30){inp.style.borderColor='#f87171';setTimeout(()=>inp.style.borderColor='',1500);return;}
  if(!data[date]?.snacks?.[idx])return;
  data[date].snacks[idx].val2=fmt1(raw);
  data[date].snacks[idx].time2=nowTime();
  save(data,date);renderToday();
}
function editSnackExtra(date,idx){
  if(!data[date]?.snacks?.[idx])return;
  delete data[date].snacks[idx].val2;delete data[date].snacks[idx].time2;
  data[date].snacks[idx].show2hr=true;
  save(data,date);renderToday();
}
function showSnackExtra(date,idx){
  if(!data[date]?.snacks?.[idx])return;
  data[date].snacks[idx].show2hr=true;
  save(data,date);renderToday();
}
function pickSnackWalk(date,idx,w){
  if(!data[date]?.snacks?.[idx])return;
  data[date].snacks[idx].walk=w;
  save(data,date);renderToday();
}
function saveSnackNote(date,idx){
  const ta=document.getElementById('snack_ta_'+idx);
  if(!ta||!data[date]?.snacks?.[idx])return;
  data[date].snacks[idx].note=ta.value.trim();
  save(data,date);renderToday();
}
function clearSnackNote(date,idx){
  if(!data[date]?.snacks?.[idx])return;
  data[date].snacks[idx].note='';
  save(data,date);renderToday();
}
function removeSnack(date,idx){
  if(!data[date]?.snacks)return;
  data[date].snacks.splice(idx,1);
  if(data[date].snacks.length===0)delete data[date].snacks;
  save(data,date);renderToday();
}

// ── TREND ──
function renderTrend(){
  const el=document.getElementById('view-trend');
  const pills=['all','fasting','post_breakfast','post_lunch','post_dinner'].map((s,i)=>
    `<button class="tpill${trendSlot===s?' active':''}" id="tp_${s}" onclick="setTrendSlot('${s}')">${['All','Fasting','Breakfast','Lunch','Dinner'][i]}</button>`).join('');
  el.innerHTML=`
    <div class="chart-card">
      <div class="chart-title">Readings since June 4</div>
      <div class="trend-filter">${pills}</div>
      <div class="chart-wrap" style="height:210px"><canvas id="trendChart" role="img" aria-label="Trend chart">Trend chart.</canvas></div>
      <div class="legend-row">
        <div class="leg-item"><div class="leg-dot" style="background:#34d399"></div>Normal</div>
        <div class="leg-item"><div class="leg-dot" style="background:#f87171"></div>High</div>
        <div class="leg-item"><div class="leg-dot" style="background:#fbbf24"></div>Low</div>
      </div>
    </div>
    <div class="chart-card">
      <div class="chart-title">Today's readings</div>
      <div class="chart-wrap" style="height:150px"><canvas id="todayChart" role="img" aria-label="Today's readings">Today's chart.</canvas></div>
    </div>`;
  buildTrendChart();buildTodayChart();
}
function setTrendSlot(s){
  trendSlot=s;
  ['all','fasting','post_breakfast','post_lunch','post_dinner'].forEach(x=>{const el=document.getElementById('tp_'+x);if(el)el.classList.toggle('active',x===s);});
  buildTrendChart();
}
function buildTrendChart(){
  const dates=dateRange();const labels=dates.map(fmtShort);
  const colors={fasting:'#60a5fa',post_breakfast:'#2dd4bf',post_lunch:'#fbbf24',post_dinner:'#c084fc'};
  const dashes={fasting:[],post_breakfast:[5,3],post_lunch:[2,3],post_dinner:[8,3]};
  let datasets=[];
  if(trendSlot==='all'){
    SLOTS.forEach(slot=>{
      const vals=dates.map(d=>data[d]?.[slot.id]?.val??null);
      datasets.push({label:slot.label.replace('1 hr after ',''),data:vals,borderColor:colors[slot.id],borderDash:dashes[slot.id],backgroundColor:'transparent',
        pointBackgroundColor:vals.map(v=>v!==null?statusColor(classify(v,slot.normal)):'transparent'),
        pointBorderColor:vals.map(v=>v!==null?statusColor(classify(v,slot.normal)):'transparent'),
        pointRadius:vals.map(v=>v!==null?4:0),tension:0.3,spanGaps:true,fill:false,borderWidth:2});
    });
  }else{
    const slot=SLOTS.find(s=>s.id===trendSlot);
    const vals=dates.map(d=>data[d]?.[slot.id]?.val??null);
    const vals2=dates.map(d=>data[d]?.[slot.id]?.val2??null);
    datasets.push({label:'1 hr',data:vals,borderColor:colors[trendSlot],backgroundColor:'rgba(96,165,250,0.05)',
      pointBackgroundColor:vals.map(v=>v!==null?statusColor(classify(v,slot.normal)):'transparent'),
      pointBorderColor:vals.map(v=>v!==null?statusColor(classify(v,slot.normal)):'transparent'),
      pointRadius:vals.map(v=>v!==null?5:0),tension:0.3,spanGaps:true,fill:true,borderWidth:2});
    if(trendSlot!=='fasting'){
      datasets.push({label:'2 hr',data:vals2,borderColor:'#a78bfa',borderDash:[4,3],backgroundColor:'transparent',
        pointBackgroundColor:vals2.map(v=>v!==null?statusColor(classify(v,NORMAL_2HR)):'transparent'),
        pointBorderColor:vals2.map(v=>v!==null?statusColor(classify(v,NORMAL_2HR)):'transparent'),
        pointRadius:vals2.map(v=>v!==null?4:0),tension:0.3,spanGaps:true,fill:false,borderWidth:1.5});
    }
  }
  if(charts.trend)charts.trend.destroy();
  charts.trend=new Chart(document.getElementById('trendChart'),{type:'line',data:{labels,datasets},options:{responsive:true,maintainAspectRatio:false,
    plugins:{legend:{display:trendSlot==='all'||(trendSlot!=='fasting'),position:'bottom',labels:{color:'#64748b',font:{size:11,family:'DM Sans'},boxWidth:10,padding:10}},
      tooltip:{callbacks:{label:c=>c.raw!==null?(c.dataset.label+': '+c.raw.toFixed(1)+' mmol/L'):''},backgroundColor:'#1e293b',borderColor:'rgba(255,255,255,0.1)',borderWidth:1,titleColor:'#94a3b8',bodyColor:'#f1f5f9'}},
    scales:{y:{min:2,max:13,ticks:{color:'#475569',font:{size:11},callback:v=>v.toFixed(1)},grid:{color:'rgba(255,255,255,0.05)'},border:{display:false}},
      x:{ticks:{color:'#475569',font:{size:10},maxRotation:45,autoSkip:true,maxTicksLimit:8},grid:{display:false},border:{display:false}}}}});
}
function buildTodayChart(){
  const td=data[todayKey()]||{};
  const vals=SLOTS.map(s=>td[s.id]?.val??null);
  const ptColors=SLOTS.map((s,i)=>vals[i]!==null?statusColor(classify(vals[i],s.normal)):'transparent');
  if(charts.today)charts.today.destroy();
  charts.today=new Chart(document.getElementById('todayChart'),{type:'line',data:{labels:['Fasting','Post-breakfast','Post-lunch','Post-dinner'],
    datasets:[{data:vals,borderColor:'#60a5fa',backgroundColor:'rgba(96,165,250,0.05)',pointBackgroundColor:ptColors,pointBorderColor:ptColors,pointRadius:vals.map(v=>v!==null?6:0),fill:true,tension:0.3,spanGaps:true,borderWidth:2}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.raw!==null?c.raw.toFixed(1)+' mmol/L':'Not logged'},backgroundColor:'#1e293b',borderColor:'rgba(255,255,255,0.1)',borderWidth:1,bodyColor:'#f1f5f9'}},
      scales:{y:{min:2,max:13,ticks:{color:'#475569',font:{size:11},callback:v=>v.toFixed(1)},grid:{color:'rgba(255,255,255,0.05)'},border:{display:false}},
        x:{ticks:{color:'#475569',font:{size:11},autoSkip:false,maxRotation:0},grid:{display:false},border:{display:false}}}}});
}

// ── HISTORY ──
function getWeekKey(date){
  const d=new Date(date+'T12:00:00');
  const day=d.getDay();
  const monday=new Date(d);
  monday.setDate(d.getDate()-day+(day===0?-6:1));
  return monday.toISOString().split('T')[0];
}
function fmtWeekRange(weekKey){
  const monday=new Date(weekKey+'T12:00:00');
  const sunday=new Date(monday);sunday.setDate(monday.getDate()+6);
  const opts={day:'numeric',month:'short'};
  return monday.toLocaleDateString('en-GB',opts)+' – '+sunday.toLocaleDateString('en-GB',opts);
}

function renderHistory(){
  const el=document.getElementById('view-history');
  el.innerHTML=`<div class="action-row"><button class="action-btn primary" onclick="exportCSV()">&#8675; Export CSV</button></div>`;

  const allDates=dateRange();
  const datesWithData=new Set(Object.keys(data).filter(d=>SLOTS.some(s=>data[d]?.[s.id]?.val!==undefined)||(data[d]?.snacks||[]).some(sn=>sn.val!==undefined)));
  const missing=allDates.filter(d=>!datesWithData.has(d)&&d<=todayKey());
  if(missing.length){
    el.innerHTML+=`<div style="background:rgba(251,191,36,0.08);border:1px solid rgba(251,191,36,0.25);border-radius:var(--radius-sm);padding:10px 14px;margin-bottom:12px;font-size:13px;color:var(--amber);">
      ${missing.length} day${missing.length>1?'s':''} with no readings — tap ← on Today tab to fill them in.
    </div>`;
  }

  const dates=allDates.reverse().filter(d=>data[d]&&(SLOTS.some(s=>data[d][s.id]?.val!==undefined)||(data[d].snacks||[]).some(sn=>sn.val!==undefined)));
  if(!dates.length){
    el.innerHTML+=`<div class="empty"><div class="empty-icon">📋</div><div class="empty-text">No entries yet.<br>Use the Today tab to log readings.</div></div>`;
    return;
  }

  // Group dates by week (Monday start)
  const weekGroups={};
  dates.forEach(date=>{
    const wk=getWeekKey(date);
    if(!weekGroups[wk])weekGroups[wk]=[];
    weekGroups[wk].push(date);
  });
  const weekKeys=Object.keys(weekGroups).sort().reverse();

  let html='';
  weekKeys.forEach(wk=>{
    const wkDates=weekGroups[wk];
    const fastingVals=wkDates.map(d=>data[d]?.fasting?.val).filter(v=>v!==undefined);
    const postSlots=['post_breakfast','post_lunch','post_dinner'];
    const postMealVals=wkDates.flatMap(d=>postSlots.map(s=>data[d]?.[s]?.val).filter(v=>v!==undefined));
    const avgFasting=fastingVals.length?fmt1(fastingVals.reduce((a,b)=>a+b,0)/fastingVals.length):null;
    const avgPostMeal=postMealVals.length?fmt1(postMealVals.reduce((a,b)=>a+b,0)/postMealVals.length):null;

    html+=`<div class="week-summary-card"><div class="week-label">Week of ${fmtWeekRange(wk)}</div><div class="week-avgs">`;
    if(avgFasting!==null){
      const fc=avgFasting>5.5?'high':'normal';
      html+=`<div class="week-avg-item"><div class="week-avg-label">Avg Fasting</div><div class="week-avg-val ${fc}">${avgFasting.toFixed(1)}</div><div class="week-avg-unit">mmol/L &middot; ${fastingVals.length} reading${fastingVals.length>1?'s':''}</div></div>`;
    }
    if(avgPostMeal!==null){
      const pc=avgPostMeal>7.8?'high':'normal';
      html+=`<div class="week-avg-item"><div class="week-avg-label">Avg Post-Meal</div><div class="week-avg-val ${pc}">${avgPostMeal.toFixed(1)}</div><div class="week-avg-unit">mmol/L &middot; ${postMealVals.length} reading${postMealVals.length>1?'s':''}</div></div>`;
    }
    html+=`</div></div>`;

    wkDates.forEach(date=>{
      const dayData=data[date]||{};
      const daySlots=SLOTS.filter(s=>dayData[s.id]?.val!==undefined);
      const daySnacks=(dayData.snacks||[]).filter(sn=>sn.val!==undefined);
      if(!daySlots.length&&!daySnacks.length)return;
      html+=`<div class="hist-date-div">${fmtDateLong(date)}</div>`;
      daySlots.forEach(slot=>{
        const e=dayData[slot.id];
        const cls=classify(e.val,slot.normal);
        const col=statusColor(cls);
        const oor=isOutOfRange(e,slot);
        const timeHtml=e.time?`<span class="hist-time">🕐 ${e.time}</span>`:'';
        const walkHtml=e.walk?`<span class="hist-walk">🚶 ${e.walk}</span>`:'';
        const noteHtml=e.note?`<div class="hist-note"><span>🍽</span><span>${escHtml(e.note)}</span></div>`:'';
        let extra2html='';
        if(e.val2!==undefined){
          const cls2=classify(e.val2,NORMAL_2HR);const col2=statusColor(cls2);
          const time2Html=e.time2?` · 🕐 ${e.time2}`:'';
          extra2html=`<div style="padding:0 16px 10px;font-size:13px;color:var(--text3);display:flex;justify-content:space-between;align-items:center">
            <span>2 hr${time2Html}</span>
            <span style="font-family:'DM Mono',monospace;font-size:16px;font-weight:600;color:${col2}">${e.val2.toFixed(1)} mmol/L</span>
          </div>`;
        }
        html+=`<div class="hist-card${oor?' out-of-range':''}">
          <div class="hist-main">
            <div class="hist-left">
              <div class="hist-slot">${slot.icon} ${slot.label}</div>
              <div class="hist-meta">${timeHtml}${walkHtml}</div>
            </div>
            <div style="display:flex;align-items:center;gap:8px">
              <span class="hist-val" style="color:${col}">${e.val.toFixed(1)}</span>
              <span style="font-size:12px;color:var(--text3)">mmol/L</span>
            </div>
          </div>${extra2html}${noteHtml}
        </div>`;
      });
      daySnacks.forEach((snack,idx)=>{
        const scls=classify(snack.val,[3.9,7.8]);
        const scol=statusColor(scls);
        const soor=scls!=='normal';
        const stimeHtml=snack.time?`<span class="hist-time">🕐 ${snack.time}</span>`:'';
        const swalkHtml=snack.walk?`<span class="hist-walk">🚶 ${snack.walk}</span>`:'';
        const snoteHtml=snack.note?`<div class="hist-note"><span>🍽</span><span>${escHtml(snack.note)}</span></div>`:'';
        let sextra2html='';
        if(snack.val2!==undefined){
          const scls2=classify(snack.val2,NORMAL_2HR);const scol2=statusColor(scls2);
          const stime2Html=snack.time2?` · 🕐 ${snack.time2}`:'';
          sextra2html=`<div style="padding:0 16px 10px;font-size:13px;color:var(--text3);display:flex;justify-content:space-between;align-items:center"><span>2 hr${stime2Html}</span><span style="font-family:'DM Mono',monospace;font-size:16px;font-weight:600;color:${scol2}">${snack.val2.toFixed(1)} mmol/L</span></div>`;
        }
        html+=`<div class="hist-card${soor?' out-of-range':''}"><div class="hist-main"><div class="hist-left"><div class="hist-slot">🍿 Snack ${idx+1} — 1 hr post-snack</div><div class="hist-meta">${stimeHtml}${swalkHtml}</div></div><div style="display:flex;align-items:center;gap:8px"><span class="hist-val" style="color:${scol}">${snack.val.toFixed(1)}</span><span style="font-size:12px;color:var(--text3)">mmol/L</span></div></div>${sextra2html}${snoteHtml}</div>`;
      });
      if(dayData.dayNote){
        html+=`<div style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;margin-bottom:12px;">
          <div style="font-size:11px;font-weight:600;color:var(--text3);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:5px;">📓 Day Notes</div>
          <div style="font-size:13px;color:var(--text2);line-height:1.5;">${escHtml(dayData.dayNote)}</div>
        </div>`;
      }
    });
  });
  el.innerHTML+=html;
}

// ── EXPORT ──
function exportCSV(){
  const rows=['Date,Reading,Time Logged,Value (mmol/L),2hr Time,2hr Value (mmol/L),Walk,Note'];
  dateRange().forEach(date=>{
    const dayData=data[date]||{};
    SLOTS.forEach(slot=>{
      const e=dayData[slot.id];
      if(!e||e.val===undefined)return;
      rows.push([
        date,slot.label,
        e.time||'',
        e.val.toFixed(1),
        e.time2||'',
        e.val2!==undefined?e.val2.toFixed(1):'',
        e.walk||'',
        (e.note||'').replace(/,/g,';').replace(/\n/g,' ')
      ].join(','));
    });
    (dayData.snacks||[]).forEach((snack,idx)=>{
      if(snack.val===undefined)return;
      rows.push([
        date,`Snack ${idx+1} (1 hr post-snack)`,
        snack.time||'',
        snack.val.toFixed(1),
        snack.time2||'',
        snack.val2!==undefined?snack.val2.toFixed(1):'',
        snack.walk||'',
        (snack.note||'').replace(/,/g,';').replace(/\n/g,' ')
      ].join(','));
    });
  });
  const blob=new Blob([rows.join('\n')],{type:'text/csv'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='glucose-log-'+todayKey()+'.csv';
  a.click();
}

// ── AUTH ──
function parseJwt(t){try{return JSON.parse(atob(t.split('.')[1]));}catch{return null;}}
function tokenFresh(t){const p=parseJwt(t);return p&&p.exp*1000>Date.now()+30000;}

function setSyncDot(status){
  const dot=document.getElementById('syncDot');
  if(!dot)return;
  dot.className='sync-dot'+(status==='ok'?' ok':status==='err'?' err':status==='syncing'?' syncing':'');
}

function loadAuthSession(){try{return JSON.parse(localStorage.getItem(AUTH_KEY));}catch{return null;}}

function storeAuthSession(accessToken,refreshToken){
  const p=parseJwt(accessToken);
  authState={userId:p?.sub,email:p?.email,accessToken,refreshToken};
  localStorage.setItem(AUTH_KEY,JSON.stringify(authState));
  const el=document.getElementById('userEmailDisplay');
  if(el)el.textContent=authState.email||'';
}

async function refreshSession(refreshToken){
  try{
    const res=await fetch(SUPABASE_URL+'/auth/v1/token?grant_type=refresh_token',{
      method:'POST',
      headers:{'apikey':SUPABASE_ANON_KEY,'Content-Type':'application/json'},
      body:JSON.stringify({refresh_token:refreshToken})
    });
    if(!res.ok)return false;
    const d=await res.json();
    storeAuthSession(d.access_token,d.refresh_token);
    return true;
  }catch{return false;}
}

async function ensureFreshToken(){
  if(!authState)return false;
  if(tokenFresh(authState.accessToken))return true;
  return await refreshSession(authState.refreshToken);
}

async function initAuth(){
  const hash=new URLSearchParams(location.hash.replace('#',''));
  const at=hash.get('access_token'),rt=hash.get('refresh_token'),type=hash.get('type');
  if(at&&type==='recovery'){
    history.replaceState(null,'',location.pathname+location.search);
    storeAuthSession(at,rt||'');
    showSetPasswordScreen();
    return;
  }
  if(at&&rt){
    history.replaceState(null,'',location.pathname+location.search);
    storeAuthSession(at,rt);
    showApp();return;
  }
  const stored=loadAuthSession();
  if(stored){
    if(tokenFresh(stored.accessToken)){authState=stored;showApp();return;}
    if(await refreshSession(stored.refreshToken)){showApp();return;}
  }
  showLoginScreen();
}

function showLoginScreen(){
  const ls=document.getElementById('loginScreen');
  ls.innerHTML=`<div class="login-card">
    <div style="font-size:48px;margin-bottom:20px">🩸</div>
    <div class="login-title">Glucose Log</div>
    <div class="login-desc">Sign in to sync your readings across all your devices.</div>
    <input type="email" id="loginEmail" class="login-input" placeholder="your@email.com" autocomplete="email">
    <input type="password" id="loginPassword" class="login-input" placeholder="password" autocomplete="current-password" style="margin-top:10px">
    <button class="login-btn" id="loginBtn" onclick="signInWithPassword()">Sign in</button>
    <button class="login-ghost-btn" onclick="sendPasswordReset()" style="margin-top:6px;font-size:13px">Forgot password?</button>
    <div id="loginError" style="font-size:13px;margin-top:10px;min-height:18px;text-align:center"></div>
  </div>`;
  ls.style.display='flex';
}

async function showApp(){
  // Show a brief loading state so Supabase data loads before rendering
  const ls=document.getElementById('loginScreen');
  ls.innerHTML=`<div class="login-card"><div style="color:var(--text3);font-size:14px">Loading your data…</div></div>`;
  ls.style.display='flex';
  data=load();
  await initSync();
  ls.style.display='none';
  const el=document.getElementById('userEmailDisplay');
  if(el&&authState?.email)el.textContent=authState.email;
  document.getElementById('topDate').textContent=new Date().toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short',year:'numeric'});
  renderToday();
}

function signOut(){
  authState=null;
  localStorage.removeItem(AUTH_KEY);
  data={};saveLocal({});
  showLoginScreen();
}

async function signInWithPassword(){
  const email=(document.getElementById('loginEmail')?.value||'').trim();
  const password=(document.getElementById('loginPassword')?.value||'');
  const errEl=document.getElementById('loginError');
  if(!email||!password){
    if(errEl){errEl.style.color='#f87171';errEl.textContent='Please enter your email and password.';}
    return;
  }
  const btn=document.getElementById('loginBtn');
  if(btn){btn.textContent='Signing in…';btn.disabled=true;}
  try{
    const res=await fetch(SUPABASE_URL+'/auth/v1/token?grant_type=password',{
      method:'POST',
      headers:{'apikey':SUPABASE_ANON_KEY,'Content-Type':'application/json'},
      body:JSON.stringify({email,password})
    });
    if(res.ok){
      const d=await res.json();
      storeAuthSession(d.access_token,d.refresh_token);
      showApp();
    }else{
      const err=await res.json().catch(()=>({}));
      const msg=err.msg||err.message||err.error_description||'Invalid email or password.';
      if(btn){btn.textContent='Sign in';btn.disabled=false;}
      if(errEl){errEl.style.color='#f87171';errEl.textContent=msg;}
    }
  }catch{
    if(btn){btn.textContent='Sign in';btn.disabled=false;}
  }
}

async function sendPasswordReset(){
  const email=(document.getElementById('loginEmail')?.value||'').trim();
  const errEl=document.getElementById('loginError');
  if(!email){
    if(errEl){errEl.style.color='#f87171';errEl.textContent='Enter your email address first.';}
    return;
  }
  const redirectTo='https://shahera5.github.io/GD-tracker/';
  const res=await fetch(SUPABASE_URL+'/auth/v1/recover?redirect_to='+encodeURIComponent(redirectTo),{
    method:'POST',
    headers:{'apikey':SUPABASE_ANON_KEY,'Content-Type':'application/json'},
    body:JSON.stringify({email})
  });
  if(res.ok){
    if(errEl){errEl.style.color='#34d399';errEl.textContent='Password reset link sent — check your email.';}
  }else{
    const err=await res.json().catch(()=>({}));
    if(errEl){errEl.style.color='#f87171';errEl.textContent=err.msg||err.message||'Something went wrong.';}
  }
}

function showSetPasswordScreen(){
  const ls=document.getElementById('loginScreen');
  ls.style.display='flex';
  ls.innerHTML=`<div class="login-card">
    <div style="font-size:48px;margin-bottom:20px">🔒</div>
    <div class="login-title">Set your password</div>
    <div class="login-desc">Choose a password you'll use to sign in every time.</div>
    <input type="password" id="newPassword" class="login-input" placeholder="new password (min 8 chars)" autocomplete="new-password">
    <input type="password" id="newPassword2" class="login-input" placeholder="confirm password" autocomplete="new-password" style="margin-top:10px">
    <button class="login-btn" id="setPwBtn" onclick="setNewPassword()">Set password</button>
    <div id="setPwError" style="font-size:13px;margin-top:10px;min-height:18px;text-align:center"></div>
  </div>`;
}

async function setNewPassword(){
  const pw=(document.getElementById('newPassword')?.value||'');
  const pw2=(document.getElementById('newPassword2')?.value||'');
  const errEl=document.getElementById('setPwError');
  if(pw.length<8){if(errEl){errEl.style.color='#f87171';errEl.textContent='Password must be at least 8 characters.';}return;}
  if(pw!==pw2){if(errEl){errEl.style.color='#f87171';errEl.textContent='Passwords do not match.';}return;}
  const btn=document.getElementById('setPwBtn');
  if(btn){btn.textContent='Saving…';btn.disabled=true;}
  try{
    const res=await fetch(SUPABASE_URL+'/auth/v1/user',{
      method:'PUT',
      headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+authState.accessToken,'Content-Type':'application/json'},
      body:JSON.stringify({password:pw})
    });
    if(res.ok){
      showApp();
    }else{
      const err=await res.json().catch(()=>({}));
      if(btn){btn.textContent='Set password';btn.disabled=false;}
      if(errEl){errEl.style.color='#f87171';errEl.textContent=err.msg||err.message||'Something went wrong.';}
    }
  }catch{
    if(btn){btn.textContent='Set password';btn.disabled=false;}
  }
}

// ── SYNC ──
async function pushDay(date){
  if(!data[date]||!authState)return;
  if(!await ensureFreshToken()){setSyncDot('err');return;}
  try{
    const res=await fetch(SUPABASE_URL+'/rest/v1/glucose_readings',{
      method:'POST',
      headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+authState.accessToken,'Content-Type':'application/json','Prefer':'resolution=merge-duplicates,return=minimal'},
      body:JSON.stringify({session_key:authState.userId,date:date,day_data:data[date],updated_at:new Date().toISOString()})
    });
    if(res.ok){localStorage.setItem('gsync_ts_'+date,new Date().toISOString());setSyncDot('ok');}
    else{const e=await res.json().catch(()=>({}));console.error('pushDay',res.status,e);setSyncDot('err');}
  }catch(e){console.error('pushDay',e);setSyncDot('err');}
}

async function pushDayWithKey(userId,date){
  if(!data[date]||!authState)return;
  if(!await ensureFreshToken())return;
  try{
    const res=await fetch(SUPABASE_URL+'/rest/v1/glucose_readings',{
      method:'POST',
      headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+authState.accessToken,'Content-Type':'application/json','Prefer':'resolution=merge-duplicates,return=minimal'},
      body:JSON.stringify({session_key:userId,date:date,day_data:data[date],updated_at:new Date().toISOString()})
    });
    if(res.ok)localStorage.setItem('gsync_ts_'+date,new Date().toISOString());
    else{const e=await res.json().catch(()=>({}));console.error('pushDayWithKey',res.status,e);}
  }catch(e){console.error('pushDayWithKey',e);}
}

async function initSync(){
  if(!authState){setSyncDot('ok');return;}
  if(!await ensureFreshToken()){setSyncDot('err');return;}
  setSyncDot('syncing');
  const uid=authState.userId;
  try{
    const res=await fetch(SUPABASE_URL+'/rest/v1/glucose_readings?session_key=eq.'+uid+'&select=date,day_data,updated_at&order=date.asc',{
      headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+authState.accessToken}
    });
    if(!res.ok){const e=await res.json().catch(()=>({}));console.error('initSync',res.status,e);setSyncDot('err');return;}
    const rows=await res.json();
    let changed=false;
    const remoteKeys=new Set();
    rows.forEach(row=>{
      remoteKeys.add(row.date);
      const localTs=localStorage.getItem('gsync_ts_'+row.date)||'';
      if(!data[row.date]||row.updated_at>localTs){
        data[row.date]=row.day_data;
        localStorage.setItem('gsync_ts_'+row.date,row.updated_at);
        changed=true;
      }
    });
    const pushes=Object.keys(data).filter(d=>!remoteKeys.has(d)).map(d=>pushDayWithKey(uid,d));
    if(pushes.length)await Promise.all(pushes);
    if(changed)saveLocal(data);
    setSyncDot('ok');
  }catch{setSyncDot('err');}
}

initAuth();
